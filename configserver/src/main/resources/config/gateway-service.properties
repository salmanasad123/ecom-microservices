# access eureka with /eureka/main as it is also behind gateway, any request that hit eureka on this
# path "http://localhost:8086/eureka/main" should be routed to this "localhost:8761/" as of now it is routing
# to localhost:8761/eureka/main, which is not a valid path for eureka, so to fix this we use filters
