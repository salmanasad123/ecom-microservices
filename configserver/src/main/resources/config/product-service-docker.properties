server.port=8084

#spring.h2.console.enabled=true
#spring.datasource.url=jdbc:h2:mem:testdb
#spring.jpa.show-sql=true
#spring.jpa.generate-ddl-auto=create

spring.datasource.url=jdbc:mysql://mysql:3306/product
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database=mysql
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# expose all actuator endpoints, including prometheus endpoint which give metrics data in the format compatible with prometheus
management.endpoints.web.exposure.include=*

# connection with rabbitmq
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# eureka properties
eureka.client.serviceUrl.defaultZone=http://eureka:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# so each service will have different log file name
#logging.level.root=INFO
logging.file.name=logs/${spring.application.name}.log

# keep the logs for 7 days
logging.logback.rollingpolicy.max-file-size=5MB
logging.logback.rollingpolicy.max-history=7

#zipkin
# all the request passing will be traced means 100% sampling
management.tracing.sampling.probability=1.0